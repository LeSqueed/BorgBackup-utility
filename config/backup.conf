# Backup identity — leave empty to use the system hostname.
BACKUP_NAME=""

# Hetzner Storage Box
HETZNER_HOST=""
HETZNER_PORT="23"
HETZNER_PATH="/home/backups"

# Username is derived automatically from HETZNER_HOST (e.g. u123456.your-storagebox.de -> u123456).
# Set explicitly here only if your storage box username differs from the hostname prefix.
HETZNER_USER=""

# SSH key used by borg (must be readable by root when run via systemd)
BORG_SSH_KEY=""

# File containing the borg encryption passphrase (root-only, mode 0600)
BORG_PASSPHRASE_FILE="/etc/backup/passphrase"

# Retention
KEEP_DAILY=7
KEEP_WEEKLY=4
KEEP_MONTHLY=6
KEEP_YEARLY=1

# Compression: none, lz4, zstd,1-22, zlib,1-9
COMPRESSION="zstd,3"

# Reporting — POST a JSON summary to this endpoint after each successful backup.
# See reporting-format.md for the payload specification.
# Leave empty to disable.
REPORT_ENDPOINT=""
REPORT_API_KEY_FILE=""
