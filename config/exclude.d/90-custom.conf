# Custom excludes — add patterns here or drop additional .conf files into
# /etc/backup/exclude.d/ (loaded in lexicographic order).
#
# Each line is a borg shell-glob (sh:) pattern. Lines starting with # are ignored.
#
# sh:** matches at any depth:
#   sh:**/build         excludes any folder named "build" anywhere
#
# Full paths exclude a specific location only:
#   sh:/home/YOUR_USERNAME/Pictures/Screenshots

# Virtual machine disk images (can be tens of GB each)
#sh:**/*.qcow2
#sh:**/*.vmdk
#sh:**/*.vdi

# Screenshots subfolder
#sh:/home/YOUR_USERNAME/Pictures/Screenshots

# Large downloaded video directories
#sh:/home/YOUR_USERNAME/Videos/Downloads
