# Default excludes — matches anywhere in the backup tree regardless of path.
# sh:** crosses directory boundaries, so sh:**/Cache excludes any folder named
# Cache at any depth. A matched directory is excluded in full.
# See: https://borgbackup.readthedocs.io/en/stable/usage/help.html#borg-patterns

# Browser and Electron app caches (Brave, Chrome, Chromium, Discord, Slack, VS Code, ...)
sh:**/Cache
sh:**/Code Cache
sh:**/GPUCache
sh:**/ShaderCache
sh:**/DawnGraphiteCache
sh:**/DawnWebGPUCache

# Firefox
sh:**/cache2
sh:**/startupCache
sh:**/OfflineCache

# Generic hidden cache directories
sh:**/.cache

# VS Code
sh:**/CachedData
sh:**/CrashpadMetrics-spare.pma

# Thumbnails and recently-used registry
sh:**/thumbnails
sh:**/recently-used.xbel

# Trash
sh:**/Trash

# KDE file indexer
sh:**/baloo

# Steam game data (saves are stored separately under Steam/userdata)
sh:**/Steam/steamapps

# Package manager caches and downloaded dependency trees
sh:**/node_modules
sh:**/vendor/bundle
sh:**/__pycache__
sh:**/*.pyc
sh:**/*.pyo
sh:**/.gradle/caches
sh:**/.m2/repository
sh:**/.cargo/registry
sh:**/.cargo/git
sh:**/.npm/_npx
sh:**/.composer/cache
